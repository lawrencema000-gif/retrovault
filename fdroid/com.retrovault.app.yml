# gitlab.com/fdroid/fdroiddata as metadata/com.retrovault.app.yml (direct MR preferred over an
# RFP issue, per fdroiddata CONTRIBUTING.md). See docs/FDROID.md for the submission checklist —
# notably the cores-from-source prerequisite that must land BEFORE this can be submitted.

Categories:
  - Games
License: GPL-3.0-or-later
AuthorName: lawrencema000-gif
AuthorWebSite: https://github.com/lawrencema000-gif
WebSite: https://github.com/lawrencema000-gif/retrovault
